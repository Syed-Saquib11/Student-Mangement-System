<div class="page-header">
  <div>
    <h2 class="page-title">Dashboard</h2>
    <p class="page-subtitle" id="dash-subtitle">Loading overview…</p>
  </div>
</div>

<div class="page-body">
  <!-- KPI Cards -->
  <div class="stats-row" id="dash-stats"></div>

  <!-- Fee split + Recent students side-by-side -->
  <div style="display:grid; grid-template-columns:1fr 2fr; gap:16px; margin-top:16px;">

    <!-- Fee breakdown card -->
    <div class="card" style="padding:20px;">
      <div style="font-size:13px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.05em; margin-bottom:16px;">Fee Status</div>
      <div id="dash-fee-chart" style="display:flex; flex-direction:column; gap:10px;"></div>
    </div>

    <!-- Recent students card -->
    <div class="card" style="padding:20px;">
      <div style="font-size:13px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.05em; margin-bottom:16px;">Recently Added Students</div>
      <div class="table-wrapper" style="max-height:260px; overflow-y:auto;">
        <table id="dash-recent-table">
          <thead>
            <tr>
              <th>Student ID</th>
              <th>Name</th>
              <th>Class</th>
              <th>Phone</th>
              <th>Fee</th>
            </tr>
          </thead>
          <tbody id="dash-recent-tbody">
            <tr><td colspan="5"><div class="empty-state" style="padding:20px 0;"><div class="empty-state-icon">⏳</div><h3>Loading…</h3></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Quick actions -->
  <div class="card" style="padding:20px; margin-top:16px;">
    <div style="font-size:13px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.05em; margin-bottom:14px;">Quick Actions</div>
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <button class="btn btn-primary" id="dash-add-student-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Student
      </button>
      <button class="btn btn-ghost" id="dash-go-courses-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Manage Courses
      </button>
      <button class="btn btn-ghost" id="dash-go-fees-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        View Fees
      </button>
      <button class="btn btn-ghost" id="dash-go-slots-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Slot Management
      </button>
    </div>
  </div>
</div>
