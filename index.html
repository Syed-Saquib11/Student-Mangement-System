<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';">
  <title>DATAFLOW</title>
  <link rel="stylesheet" href="../css/main.css" />
  <!-- Page-specific CSS is swapped by router.js to prevent cross-page conflicts -->
  <link rel="stylesheet" href="" id="page-css" />
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <header class="sidebar-header">
      <div class="sidebar-logo" aria-hidden="true">
        <svg class="sidebar-logo-house" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 14L16 6l10 8v14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V14z" fill="#f8fafc"/>
          <path d="M4 14L16 4l12 10" stroke="#e11d48" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <rect x="13" y="19" width="6" height="9" rx="1" fill="#16a34a"/>
        </svg>
      </div>
      <div class="sidebar-header-text">
        <h1 class="sidebar-title">DATAFLOW</h1>
        <p class="sidebar-tagline">Teacher Portal</p>
      </div>
    </header>

    <nav class="sidebar-nav" aria-label="Main navigation">
      <a class="nav-item" data-page="dashboard" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>

        </svg>
        Dashboard
      </a>

      <a class="nav-item" data-page="courses" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          <path d="M12 7v10"/>
        </svg>
        Courses
      </a>

      <a class="nav-item active" data-page="students" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>

          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>

        Students
      </a>

      <a class="nav-item" data-page="slots" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>

        Slot Management
      </a>

      <a class="nav-item" data-page="tests" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v4c0 1.7 2.2 3 6 3s6-1.3 6-3v-4"/>
        </svg>
        Tests &amp; Grades
      </a>

      <a class="nav-item" data-page="forms" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <path d="M14 2v6h6"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="14" y2="17"/>
        </svg>
        Forms &amp; Documents
      </a>

      <a class="nav-item" data-page="fees" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <line x1="2" y1="10" x2="22" y2="10"/>

  <main class="main-content" id="main-content" aria-live="polite"></main>

<div id="toast-container"></div>
<div id="modal-root"></div>

<script src="../js/student.js"></script>
<script src="../js/students.js"></script>
<script src="../js/dashboard.js"></script>
<script src="../js/slots.js"></script>
<script src="../js/courses.js"></script>
<script src="../js/fees.js"></script>
<script src="../js/tests.js"></script>
<script src="../js/forms.js"></script>
<script src="../js/router.js"></script>
</body>
</html>
