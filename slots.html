<div class="page-header">
  <div>
    <h2 class="page-title">Slot Management</h2>
    <p class="page-subtitle" id="slots-subtitle">Loading slots…</p>
  </div>
  <button class="btn btn-primary" id="btn-add-slot">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Add Slot
  </button>
</div>

<div class="page-body">
  <div class="stats-row" id="slots-stats"></div>

  <div class="table-card" style="margin-top:16px;">
    <div class="table-wrapper">
      <table id="slots-table">
        <thead>
          <tr>
            <th>Slot Name</th>
            <th>Day(s)</th>
            <th>Start Time</th>
            <th>End Time</th>
            <th>Subject / Course</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="slots-tbody">
          <tr><td colspan="7">
            <div class="empty-state">
              <div class="empty-state-icon">⏳</div>
              <h3>Loading slots…</h3>
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>
    <div class="table-footer">
      <span class="table-count" id="slots-count">—</span>
    </div>
  </div>
</div>

<!-- Add/Edit Slot Modal (injected into #modal-root by slots.js) -->
